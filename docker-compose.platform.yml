name: telecom-platform

x-common-service: &common-service
  restart: unless-stopped
  networks:
    - platform-net

x-common-environment: &common-environment
  RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/

services:
  postgres:
    <<: *common-service
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: postgres:16-alpine
    networks: [platform-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infra/postgres/init-databases.sh:/init-databases.sh:ro
    entrypoint: ["/bin/sh", "/init-databases.sh"]
    restart: "no"

  rabbitmq:
    <<: *common-service
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    <<: *common-service
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  device-service:
    <<: *common-service
    build:
      context: ./services/device-service
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/device_db
      LOG_LEVEL: INFO
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8080"]
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"

  inventory-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/inventory_db
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8086:8080"

  workflow-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/workflow-service/Dockerfile
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/workflow_db
      EXECUTION_MODE: ${WORKFLOW_EXECUTION_MODE}
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8080"

  workflow-worker:
    <<: *common-service
    build:
      context: .
      dockerfile: services/workflow-service/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/workflow_db
      EXECUTION_MODE: ${WORKFLOW_EXECUTION_MODE}
    depends_on:
      workflow-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/notification_db
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"

  notification-consumer:
    <<: *common-service
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    command: ["python", "-m", "app.consumer"]
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/notification_db
    depends_on:
      notification-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  audit-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/audit_db
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "8084:8080"

  audit-consumer:
    <<: *common-service
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    command: ["python", "-m", "app.consumer"]
    environment:
      <<: *common-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/audit_db
    depends_on:
      audit-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    <<: *common-service
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${GATEWAY_ADMIN_USERNAME}
      ADMIN_PASSWORD: ${GATEWAY_ADMIN_PASSWORD}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      DEVICE_SERVICE_URL: http://device-service:8080
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      WORKFLOW_SERVICE_URL: http://workflow-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      AUDIT_SERVICE_URL: http://audit-service:8080
    depends_on:
      redis:
        condition: service_healthy
      device-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      workflow-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    ports:
      - "8080:8080"

networks:
  platform-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
