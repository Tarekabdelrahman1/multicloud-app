apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: telecom-platform
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: telecom-platform
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default":"frontend-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
