apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: telecom-platform
  labels:
    app.kubernetes.io/name: audit-service
    app.kubernetes.io/part-of: telecom-platform
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
        app.kubernetes.io/name: audit-service
        app.kubernetes.io/part-of: telecom-platform
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: audit-service
          image: us-central1-docker.pkg.dev/devops-project-503113/dev-docker/audit-service:phase3-complete
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secret
            - secretRef:
                name: platform-runtime-urls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
