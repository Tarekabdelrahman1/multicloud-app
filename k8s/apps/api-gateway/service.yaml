apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: telecom-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: telecom-platform
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default":"api-gateway-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
