apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: telecom-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: telecom-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: telecom-platform
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: us-central1-docker.pkg.dev/devops-project-503113/dev-docker/api-gateway:phase3-complete
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: api-gateway-auth
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DEVICE_SERVICE_URL
              value: http://device-service:8080
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8080
            - name: WORKFLOW_SERVICE_URL
              value: http://workflow-service:8080
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8080
            - name: AUDIT_SERVICE_URL
              value: http://audit-service:8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
