apiVersion: v1
kind: ConfigMap

metadata:
  name: platform-config
  namespace: telecom-platform

data:
  ENVIRONMENT: "development"

  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"

  DEVICE_SERVICE_HOST: "device-service"
  INVENTORY_SERVICE_HOST: "inventory-service"
  WORKFLOW_SERVICE_HOST: "workflow-service"
  NOTIFICATION_SERVICE_HOST: "notification-service"
  AUDIT_SERVICE_HOST: "audit-service"
