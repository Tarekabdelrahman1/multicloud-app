apiVersion: v1
kind: Service

metadata:
  name: api-gateway
  namespace: telecom-platform

  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default":"api-gateway-backend-config"}'

spec:
  selector:
    app: api-gateway

  ports:
    - name: http
      port: 80
      targetPort: 8080

  type: ClusterIP
