apiVersion: apps/v1
kind: Deployment

metadata:
  name: device-service
  namespace: telecom-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: device-service

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: device-service

    spec:
      containers:
        - name: device-service
          image: us-central1-docker.pkg.dev/devops-project-503113/dev-docker/device-service:phase3-complete

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: platform-config

            - secretRef:
                name: platform-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3






