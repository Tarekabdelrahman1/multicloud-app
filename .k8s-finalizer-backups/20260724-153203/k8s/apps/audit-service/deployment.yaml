apiVersion: apps/v1
kind: Deployment

metadata:
  name: audit-service
  namespace: telecom-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: audit-service

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: audit-service

    spec:
      containers:
        - name: audit-service
          image: us-central1-docker.pkg.dev/devops-project-503113/dev-docker/audit-service:phase3-complete

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: platform-config

            - secretRef:
                name: platform-secret

          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://platform_admin:ChangeMe123!@postgres:5432/platform_db"

            - name: RABBITMQ_URL
              value: "amqp://admin:ChangeMe123!@rabbitmq:5672/"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
